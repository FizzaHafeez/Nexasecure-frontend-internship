<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 19 - Form Validation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="form-wrap">
    <h1>Create Account</h1>
    <p class="subtitle">All fields are validated with JavaScript before submission.</p>

    <!-- novalidate disables browser defaults so OUR validation runs -->
    <form id="signupForm" novalidate>
      <div class="field">
        <label for="username">Username <span class="req">*</span></label>
        <input type="text" id="username" placeholder="3-15 characters, letters and numbers">
        <p class="error-msg" id="usernameError"></p>
      </div>

      <div class="field">
        <label for="email">Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="you@example.com">
        <p class="error-msg" id="emailError"></p>
      </div>

      <div class="field">
        <label for="phone">Phone <span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="10-13 digits">
        <p class="error-msg" id="phoneError"></p>
      </div>

      <div class="field">
        <label for="password">Password <span class="req">*</span></label>
        <input type="password" id="password" placeholder="Min 8 chars, 1 number, 1 uppercase">
        <p class="error-msg" id="passwordError"></p>
        <div class="strength" id="strengthBar"><div></div></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm Password <span class="req">*</span></label>
        <input type="password" id="confirm" placeholder="Re-enter password">
        <p class="error-msg" id="confirmError"></p>
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" id="terms">
          I agree to the Terms &amp; Conditions <span class="req">*</span>
        </label>
        <p class="error-msg" id="termsError"></p>
      </div>

      <button type="submit" id="submitBtn">Create Account</button>
    </form>

    <p class="success-msg hidden" id="successMsg">✅ Account created successfully! All inputs are valid.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
