<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days 11-12 - Calculator App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="calculator">
    <h1>Calculator</h1>

    <div class="display">
      <div class="history" id="history"></div>
      <div class="current" id="display">0</div>
    </div>

    <div class="keys">
      <!-- Row 1: advanced ops (Day 12) -->
      <button class="key fn" data-action="clear">AC</button>
      <button class="key fn" data-action="delete">DEL</button>
      <button class="key fn" data-action="percent">%</button>
      <button class="key op" data-op="/">&divide;</button>

      <!-- Row 2 -->
      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">&times;</button>

      <!-- Row 3 -->
      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">&minus;</button>

      <!-- Row 4 -->
      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <!-- Row 5: advanced ops (Day 12) -->
      <button class="key fn" data-action="sqrt">&radic;</button>
      <button class="key" data-num="0">0</button>
      <button class="key" data-num=".">.</button>
      <button class="key equals" data-action="equals">=</button>
    </div>

    <p class="hint">Keyboard supported: digits, + - * /, Enter (=), Backspace (DEL), Esc (AC)</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
