<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days 13-14 - To-Do App with Local Storage</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>My Tasks</h1>
      <p class="date" id="dateDisplay"></p>
    </header>

    <!-- Add task input -->
    <div class="add-task">
      <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="120">
      <button id="addBtn">Add</button>
    </div>

    <!-- Filters (Day 14 polish) -->
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="active">Active</button>
      <button class="filter" data-filter="completed">Completed</button>
    </div>

    <!-- Task list -->
    <ul id="taskList"></ul>

    <!-- Empty state -->
    <p class="empty-state" id="emptyState">No tasks yet — add your first one above.</p>

    <!-- Footer stats -->
    <footer class="app-footer">
      <span id="taskCount">0 tasks</span>
      <button id="clearCompleted">Clear completed</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
